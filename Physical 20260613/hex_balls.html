<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spinning Hexagon · 22 Balls</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #07070d;
    overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif;
    color: #9aa;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  .hud {
    position: fixed; top: 12px; left: 14px;
    font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0.55;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">22 balls &middot; spinning hexagon &middot; real physics</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- world params ----------
  const BALL_COUNT   = 22;
  const BALL_R       = 14;
  const GRAVITY      = 1100;     // px / s^2
  const LINEAR_DRAG  = 0.0009;   // per-second-ish damping
  const WALL_REST    = 0.72;
  const BALL_REST    = 0.90;
  const WALL_FRICT   = 0.18;     // tangential friction at walls
  const ROT_SPEED    = 1.35;     // rad/s of the hexagon

  // ---------- helpers ----------
  const cx = () => W * 0.5;
  const cy = () => H * 0.5;
  const hexR = () => Math.min(W, H) * 0.42;
  const rand = (a, b) => a + Math.random() * (b - a);

  // ---------- balls ----------
  const balls = [];
  for (let i = 0; i < BALL_COUNT; i++) {
    balls.push({
      x: 0, y: 0,
      vx: rand(-40, 40), vy: rand(-40, 40),
      r:  BALL_R,
      hue: (i * 37 + 12) % 360,
    });
  }
  // place non-overlapping, well inside the hex
  (function place() {
    const R = hexR();
    for (let i = 0; i < BALL_COUNT; i++) {
      const b = balls[i];
      let tries = 0, ok = false;
      while (tries++ < 400) {
        b.x = cx() + rand(-R * 0.35, R * 0.35);
        b.y = cy() + rand(-R * 0.35, R * 0.35);
        ok = true;
        for (let j = 0; j < i; j++) {
          const o = balls[j];
          const dx = o.x - b.x, dy = o.y - b.y;
          const minD = (o.r + b.r + 2);
          if (dx*dx + dy*dy < minD * minD) { ok = false; break; }
        }
        if (ok) break;
      }
    }
  })();

  // ---------- hexagon ----------
  let hexAngle = 0;
  function hexVerts(a) {
    const R = hexR(), v = [];
    for (let i = 0; i < 6; i++) {
      const t = a + i * (Math.PI / 3);
      v.push({ x: cx() + Math.cos(t) * R, y: cy() + Math.sin(t) * R });
    }
    return v;
  }

  // Edge info: returns inward normal + signed distance from point to the line.
  // Positive signed distance => point is inside the hex.
  function edgeInfo(px, py, ax, ay, bx, by) {
    const ex = bx - ax, ey = by - ay;
    const len = Math.hypot(ex, ey) || 1;
    // a perpendicular
    let nx = -ey / len, ny = ex / len;
    // pick the one pointing toward the center
    const mx = (ax + bx) * 0.5, my = (ay + by) * 0.5;
    const tx = cx() - mx, ty = cy() - my;
    if (nx * tx + ny * ty < 0) { nx = -nx; ny = -ny; }
    const d = (px - ax) * nx + (py - ay) * ny;
    return { nx, ny, d, len, tx: -ny, ty: nx }; // tx,ty = unit tangent
  }

  // ---------- physics ----------
  function resolveWalls() {
    const verts = hexVerts(hexAngle);
    for (const b of balls) {
      for (let i = 0; i < 6; i++) {
        const a = verts[i], v = verts[(i + 1) % 6];
        const e = edgeInfo(b.x, b.y, a.x, a.y, v.x, v.y);
        if (e.d < b.r) {
          // push out
          const pen = b.r - e.d;
          b.x += e.nx * pen;
          b.y += e.ny * pen;

          // wall velocity at contact (rigid rotation about hex center)
          const rx = b.x - cx();
          const ry = b.y - cy();
          const wvx = -ROT_SPEED * ry;
          const wvy =  ROT_SPEED * rx;

          // relative normal velocity
          const rvx = b.vx - wvx;
          const rvy = b.vy - wvy;
          const vn  = rvx * e.nx + rvy * e.ny;
          if (vn < 0) {
            const jn = -(1 + WALL_REST) * vn;
            b.vx += jn * e.nx;
            b.vy += jn * e.ny;

            // tangential friction (Coulomb-ish)
            const vt = (b.vx - wvx) * e.tx + (b.vy - wvy) * e.ty;
            const jt = -WALL_FRICT * Math.abs(jn) * Math.sign(vt);
            b.vx += jt * e.tx;
            b.vy += jt * e.ty;
          }
        }
      }
    }
  }

  function resolveBalls() {
    for (let i = 0; i < balls.length; i++) {
      const a = balls[i];
      for (let j = i + 1; j < balls.length; j++) {
        const b = balls[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const r  = a.r + b.r;
        const d2 = dx*dx + dy*dy;
        if (d2 < r * r && d2 > 1e-6) {
          const d = Math.sqrt(d2);
          const nx = dx / d, ny = dy / d;
          const pen = r - d;
          // separate
          a.x -= nx * pen * 0.5; a.y -= ny * pen * 0.5;
          b.x += nx * pen * 0.5; b.y += ny * pen * 0.5;

          // equal mass elastic-ish impulse along the contact normal
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const vn  = rvx * nx + rvy * ny;
          if (vn < 0) {
            const j = -(1 + BALL_REST) * vn * 0.5;
            a.vx -= j * nx; a.vy -= j * ny;
            b.vx += j * nx; b.vy += j * ny;
          }
        }
      }
    }
  }

  function step(dt) {
    hexAngle += ROT_SPEED * dt;

    for (const b of balls) {
      b.vy += GRAVITY * dt;
      // exponential drag
      const damp = Math.exp(-LINEAR_DRAG * dt * 1000);
      b.vx *= damp;
      b.vy *= damp;
      b.x  += b.vx * dt;
      b.y  += b.vy * dt;
    }

    resolveWalls();
    resolveBalls();
  }

  // ---------- rendering ----------
  function drawHex(a) {
    const v = hexVerts(a);
    ctx.beginPath();
    ctx.moveTo(v[0].x, v[0].y);
    for (let i = 1; i < 6; i++) ctx.lineTo(v[i].x, v[i].y);
    ctx.closePath();

    ctx.lineJoin = 'round';
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(170, 215, 255, 0.95)';
    ctx.shadowColor = 'rgba(120, 180, 255, 0.55)';
    ctx.shadowBlur  = 22;
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // vertex pips
    for (const p of v) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#e8f4ff';
      ctx.fill();
    }
  }

  function drawBalls() {
    for (const b of balls) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(
        b.x - b.r * 0.4, b.y - b.r * 0.4, b.r * 0.1,
        b.x, b.y, b.r
      );
      grad.addColorStop(0, `hsl(${b.hue}, 95%, 78%)`);
      grad.addColorStop(1, `hsl(${b.hue}, 80%, 48%)`);
      ctx.fillStyle = grad;
      ctx.shadowColor = `hsla(${b.hue}, 90%, 55%, 0.7)`;
      ctx.shadowBlur  = 14;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // ---------- main loop ----------
  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05;

    // sub-step for stability with fast-moving walls
    const SUB = 4;
    const sdt = dt / SUB;
    for (let i = 0; i < SUB; i++) step(sdt);

    // motion-blur style background
    ctx.fillStyle = 'rgba(7, 7, 13, 0.38)';
    ctx.fillRect(0, 0, W, H);

    drawHex(hexAngle);
    drawBalls();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
